name: Build Windows Qt OpenCASCADE Project

on:
  push:
    branches: [ fix/boost ]
  pull_request:
    branches: [ fix/boost ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      QT_VERSION: '5.14.0'
      QT_ARCH: 'win64_msvc2017_64'
      OCC_VERSION: '7.8.0'
      OCC_VERSION_TAG: 'V7_8_0' 
      VCPKG_ROOT: 'C:\vcpkg'
      VS_VERSION: 'Visual Studio 17 2022'
      QT_ROOT: 'C:\Qt'
      OCC_ROOT: 'C:\opencascade'
      BOOST_VERSION: '1.84.0'
      BOOST_ZIP: 'boost-1.84.0.zip'
      BOOST_URL: 'https://github.com/boostorg/boost/releases/download/boost-1.84.0/boost-1.84.0.zip'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Cache Qt
      id: cache-qt
      uses: actions/cache@v4
      with:
        path: ${{ env.QT_ROOT }}
        key: ${{ runner.os }}-Qt-${{ env.QT_VERSION }}-${{ env.QT_ARCH }}
        
    - name: Install Qt 
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        arch: ${{ env.QT_ARCH }}
        cached: ${{ steps.cache-qt.outputs.cache-hit }}
        modules: 'qtcharts qtdatavis3d qtnetworkauth'

    - name: Cache Boost archive
      id: cache-boost-archive
      uses: actions/cache@v4
      with:
        path: ${{ env.BOOST_ZIP }}
        key: ${{ runner.os }}-Boost-archive-${{ env.BOOST_VERSION }}

    - name: Download Boost archive
      if: steps.cache-boost-archive.outputs.cache-hit != 'true'
      uses: carlosperate/download-file-action@v2
      with:
        file-url: ${{ env.BOOST_URL }}
        file-path: ${{ env.BOOST_ZIP }}

    - name: Cache Boost extracted
      id: cache-boost-extract
      uses: actions/cache@v4
      with:
        path: |
          boost-*
          boost_*
        key: ${{ runner.os }}-Boost-extract-${{ env.BOOST_VERSION }}

    - name: Extract Boost
      if: steps.cache-boost-extract.outputs.cache-hit != 'true'
      run: |
        7z x ${{ env.BOOST_ZIP }}

    - name: Resolve Boost root
      id: boost-root
      shell: pwsh
      run: |
        $workspace = "${{ github.workspace }}"

        # 1) Fast path: common extracted folder names.
        $candidates = @(
          (Join-Path $workspace "boost-${{ env.BOOST_VERSION }}"),
          (Join-Path $workspace ("boost_" + "${{ env.BOOST_VERSION }}".Replace(".", "_"))),
          $workspace
        )
        $boostRoot = $null
        foreach ($candidate in $candidates) {
          if (Test-Path (Join-Path $candidate "boost\version.hpp")) {
            $boostRoot = $candidate
            break
          }
        }

        # 2) Fallback: recursively locate boost/version.hpp and use its parent as Boost root.
        if (-not $boostRoot) {
          $versionHeader = Get-ChildItem -Path $workspace -Recurse -File -Filter version.hpp -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\boost\\version\.hpp$" } |
            Select-Object -First 1
          if ($versionHeader) {
            $boostRoot = Split-Path (Split-Path $versionHeader.FullName -Parent) -Parent
          }
        }

        if (-not $boostRoot) {
          Write-Host "Workspace directories after extraction:"
          Get-ChildItem -Path $workspace -Force | Select-Object Name, FullName, Mode
          throw "Boost directory not found after extraction."
        }

        Write-Host "Resolved BOOST_ROOT: $boostRoot"
        "BOOST_ROOT=$boostRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Cache OpenCASCADE archive
      id: cache-opencascade
      uses: actions/cache@v4
      with:
        path: occt-vc143-64.zip
        key: ${{ runner.os }}-OpenCASCADE-${{ env.OCC_VERSION }}-precompiled-vc143

    - name: Download OpenCascade
      if: steps.cache-opencascade.outputs.cache-hit != 'true'
      uses: carlosperate/download-file-action@v2
      with:
          file-url: 'https://github.com/Open-Cascade-SAS/OCCT/releases/download/${{env.OCC_VERSION_TAG}}/occt-vc143-64.zip'
          file-path: occt-vc143-64.zip

    - name: Download OpenCascade 3rdparty
      if: steps.cache-opencascade.outputs.cache-hit != 'true'
      uses: carlosperate/download-file-action@v2
      with:
          file-url: 'https://github.com/Open-Cascade-SAS/OCCT/releases/download/${{env.OCC_VERSION_TAG}}/3rdparty-vc14-64.zip'
          file-path: 3rdparty-vc14-64.zip

    - name: Extract OpenCascade
      run: 7z x occt-vc143-64.zip

    - name: Extract OpenCascade 3rdparty
      run: 7z x 3rdparty-vc14-64.zip

    - name: Get count of CPU cores
      uses: SimenB/github-actions-cpu-cores@v1
      id: cpu-cores

    - name: Configure Compiler
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build
      shell: cmd
      run: |
          mkdir ${{github.workspace}}\build
          cd ${{github.workspace}}\build
          cmake --version
          cmake .. ^
                -DOpenCASCADE_DIR="${{github.workspace}}\occt-vc143-64" ^
                -DOpenCASCADE_3RDPARTY_DIR="${{github.workspace}}\3rdparty-vc14-64" ^
                -DBOOST_ROOT="%BOOST_ROOT%" ^
                -DBOOST_INCLUDEDIR="%BOOST_ROOT%" ^
                -DBoost_NO_SYSTEM_PATHS=ON
          cmake --build . ^
                --config Release ^
                --parallel ${{steps.cpu-cores.outputs.count}}

    - name: Upload Module
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build/**/*.log
          CMakeFiles/**/*.log
        retention-days: 1

    - name: Upload zip artifact
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          build/Release/*.exe
          build/Release/*.dll
        retention-days: 1
